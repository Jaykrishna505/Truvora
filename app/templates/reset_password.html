<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password | Truvora</title>
    <link rel="stylesheet" href="/static/styles.css?v=0.1.11" />
  </head>
  <body class="auth-page">
    <main class="auth-layout">
      <section class="auth-copy">
        <div class="brand-row"><div class="brand-mark">SS</div><strong>Truvora</strong></div>
        <h1>Choose a new password.</h1>
        <p>Your reset link is valid for 30 minutes and can only be used once.</p>
      </section>
      <section class="auth-card">
        <form class="auth-form" id="reset-form">
          <label>New password<input name="password" type="password" minlength="8" required /></label>
          <label>Confirm password<input name="confirmPassword" type="password" minlength="8" required /></label>
          <button class="primary-button" type="submit">Update password</button>
        </form>
        <output class="auth-message hidden" id="reset-message"></output>
        <a class="text-link" href="/">Return to login</a>
      </section>
    </main>
    <script>window.resetToken = "{{ token }}";</script>
    <script src="/static/reset_password.js"></script>
  </body>
</html>
